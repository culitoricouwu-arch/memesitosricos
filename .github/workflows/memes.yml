name: Auto Memes

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - run: python meme.py
        env:
          WEBHOOK: ${{ secrets.WEBHOOK }}
